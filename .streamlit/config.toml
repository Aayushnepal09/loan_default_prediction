# Streamlit configuration for the Phase 4 presentation app.
# Forcing light theme so the live demo looks identical regardless of the
# audience's browser theme. Colors match the rest of the deck and figures.

[theme]
base = "light"
primaryColor = "#0E3D70"           # navy - sliders, primary button, focus rings
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F6FA"  # sidebar + secondary surfaces
textColor = "#1A2440"
font = "sans serif"

[server]
# Quieter logs - the app is presentation-grade, no need for the runtime banner
headless = true
runOnSave = true

[browser]
gatherUsageStats = false
